<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗓️ تقویم شمسی</title>
    <script src="https://cdn.jsdelivr.net/npm/jalaali-js@1.2.6/dist/jalaali.js">
    </script>
    <style>
        /* ============================
                   RESET & BASE
                ============================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            direction: rtl;
        }

        .container {
            background: #111;
            border: 2px solid #00ff41;
            border-radius: 24px;
            padding: 24px 20px 20px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 0 60px rgba(0, 255, 65, 0.04);
            color: #aaa;
        }

        /* ============================
                   HEADER
                ============================ */
        .header {
            text-align: center;
            margin-bottom: 18px;
        }

        .header h1 {
            color: #00ff41;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header .sub {
            color: #666;
            font-size: 11px;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        .header .sub span {
            color: #00ff41;
        }

        /* ============================
                   MONTH NAVIGATION
                ============================ */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 12px 4px;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 16px;
        }

        .nav .month-year {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav button {
            background: transparent;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #888;
            font-size: 20px;
            padding: 4px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            line-height: 1.6;
            touch-action: manipulation;
        }

        .nav button:hover {
            border-color: #00ff41;
            color: #00ff41;
        }

        .nav button:active {
            transform: scale(0.92);
        }

        .nav .today-btn {
            font-size: 12px;
            padding: 4px 12px;
            border-color: #333;
            color: #555;
        }

        .nav .today-btn:hover {
            border-color: #00ff41;
            color: #00ff41;
        }

        /* ============================
                   WEEKDAY HEADERS
                ============================ */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            text-align: center;
            color: #555;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .weekdays .holiday {
            color: #ff4444;
        }

        /* ============================
                   DAYS GRID
                ============================ */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #aaa;
            background: #0d0d0d;
            border: 2px solid transparent;
            transition: all 0.15s ease;
            cursor: pointer;
            user-select: none;
        }

        .day-cell:hover {
            border-color: #333;
        }

        .day-cell.other-month {
            color: #333;
        }

        .day-cell.today {
            border-color: #00ff41;
            color: #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.04);
        }

        .day-cell.holiday {
            color: #ff4444;
        }

        .day-cell.friday {
            color: #ff6b6b;
        }

        .day-cell.selected {
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.08);
        }

        /* ============================
                   INFO BOX
                ============================ */
        .info-box {
            margin-top: 16px;
            padding: 12px 14px;
            background: #0d0d0d;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .info-box .label {
            color: #666;
            font-size: 12px;
        }

        .info-box .value {
            color: #00ff41;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .info-box .value.holiday-name {
            color: #ffd700;
        }

        /* ============================
                   FOOTER
                ============================ */
        .footer {
            text-align: center;
            color: #222;
            font-size: 9px;
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid #111;
            letter-spacing: 0.5px;
        }

        .footer span {
            color: #00ff41;
        }

        /* ============================
                   SELECTED DATE DISPLAY
                ============================ */
        .selected-display {
            margin-top: 10px;
            padding: 8px 14px;
            background: #0a0a0a;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .selected-display .sel-date {
            color: #ffd700;
            font-weight: 600;
        }

        /* ============================
                   RESPONSIVE
                ============================ */
        @media (max-width: 420px) {
            .container {
                padding: 16px 12px 14px;
            }

            .header h1 {
                font-size: 20px;
            }

            .nav .month-year {
                font-size: 15px;
            }

            .nav button {
                font-size: 17px;
                padding: 2px 10px;
            }

            .day-cell {
                font-size: 13px;
                border-radius: 8px;
            }

            .info-box {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }
        }

        @media (max-width: 360px) {
            .day-cell {
                font-size: 11px;
                border-radius: 6px;
            }

            .weekdays {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <h1>🗓️ تقویم شمسی</h1>
            <div class="sub">by <span>KnoX</span>  |  Good Luck &lt;3</div>
        </div>

        <!-- NAVIGATION -->
        <div class="nav">
            <button id="prevMonthBtn">‹</button>
            <span class="month-year" id="monthYearDisplay">مهر ۱۴۰۴</span>
            <button id="nextMonthBtn">›</button>
            <button class="today-btn" id="todayBtn">امروز</button>
        </div>

        <!-- WEEKDAYS -->
        <div class="weekdays">
            <span class="holiday">ش</span>
            <span>ی</span>
            <span>د</span>
            <span>س</span>
            <span>چ</span>
            <span>پ</span>
            <span class="holiday">ج</span>
        </div>

        <!-- DAYS -->
        <div class="days-grid" id="daysGrid"></div>

        <!-- SELECTED DATE DISPLAY -->
        <div class="selected-display" id="selectedDisplay">
            📅 تاریخ انتخاب‌شده: <span class="sel-date" id="selectedDateText">هیچ</span>
        </div>

        <!-- INFO BOX -->
        <div class="info-box">
            <span class="label">📅 تاریخ امروز:</span>
            <span class="value" id="todayDateDisplay">۱۴۰۵/۰۴/۰۶</span>
            <span class="label">📆 روز هفته:</span>
            <span class="value" id="weekdayDisplay">شنبه</span>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span>#Dillimore Projects by KnoX</span>  |  Good Luck &lt;3
        </div>

    </div>

    <script>
        // ================================================================
        // 🗓️ PERSIAN CALENDAR  –  by KnoX  –  Version 2.0.0
        // ================================================================

        // ---------- DOM ----------
        const monthYearDisplay = document.getElementById('monthYearDisplay');
        const daysGrid = document.getElementById('daysGrid');
        const todayDateDisplay = document.getElementById('todayDateDisplay');
        const weekdayDisplay = document.getElementById('weekdayDisplay');
        const selectedDateText = document.getElementById('selectedDateText');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');
        const todayBtn = document.getElementById('todayBtn');

        // ---------- STATE ----------
        let currentJYear = 1405;
        let currentJMonth = 3; // 0-based (0 = Farvardin, 3 = Tir)
        let selectedDate = null; // { jy, jm, jd }

        // ---------- HELPERS ----------
        function getMonthName(jMonth) {
            const names = [
                'فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور',
                'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'
            ];
            return names[jMonth] || '';
        }

        function getWeekdayName(jd, jy, jm, jd2) {
            // Convert to Gregorian then get day of week
            const g = jalaali.toGregorian(jy, jm + 1, jd2);
            const date = new Date(g.gy, g.gm - 1, g.gd);
            const dayOfWeek = date.getDay(); // 0=Sunday, 1=Monday, ...
            // Persian week: 0=Saturday, 1=Sunday, 2=Monday, 3=Tuesday, 4=Wednesday, 5=Thursday, 6=Friday
            const persianWeek = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
            // Map Sunday(0) -> 1, Monday(1)->2, ..., Friday(5)->6, Saturday(6)->0
            let idx = (dayOfWeek + 1) % 7;
            return persianWeek[idx];
        }

        function getToday() {
            const now = new Date();
            const j = jalaali.toJalaali(now.getFullYear(), now.getMonth() + 1, now.getDate());
            return { jy: j.jy, jm: j.jm - 1, jd: j.jd };
        }

        // ---------- RENDER CALENDAR ----------
        function renderCalendar(jYear, jMonth) {
            // Get first day of month in Gregorian
            const firstDayGreg = jalaali.toGregorian(jYear, jMonth + 1, 1);
            const firstDate = new Date(firstDayGreg.gy, firstDayGreg.gm - 1, firstDayGreg.gd);

            // Number of days in this Jalali month
            const daysInMonth = jalaali.jalaaliMonthLength(jYear, jMonth + 1);

            // Get day of week for first day (0=Sunday)
            const firstDayOfWeek = firstDate.getDay();
            // Offset: column 0 = Saturday (6 in JS), column 6 = Friday (5 in JS)
            let offset;
            if (firstDayOfWeek === 6) offset = 0;
            else if (firstDayOfWeek === 5) offset = 6;
            else offset = firstDayOfWeek + 1;

            // Get today
            const today = getToday();

            // Previous month days count
            let prevMonthDays;
            if (jMonth === 0) {
                prevMonthDays = jalaali.jalaaliMonthLength(jYear - 1, 12);
            } else {
                prevMonthDays = jalaali.jalaaliMonthLength(jYear, jMonth);
            }

            const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
            const days = [];

            for (let i = 0; i < totalCells; i++) {
                let day;
                let isOtherMonth = false;
                let cellJYear = jYear;
                let cellJMonth = jMonth;

                if (i < offset) {
                    // Previous month
                    const dayNum = prevMonthDays - offset + i + 1;
                    day = dayNum;
                    isOtherMonth = true;
                    if (jMonth === 0) {
                        cellJYear = jYear - 1;
                        cellJMonth = 11;
                    } else {
                        cellJMonth = jMonth - 1;
                    }
                } else if (i >= offset + daysInMonth) {
                    // Next month
                    const dayNum = i - offset - daysInMonth + 1;
                    day = dayNum;
                    isOtherMonth = true;
                    if (jMonth === 11) {
                        cellJYear = jYear + 1;
                        cellJMonth = 0;
                    } else {
                        cellJMonth = jMonth + 1;
                    }
                } else {
                    day = i - offset + 1;
                }

                // Check if Friday (Jomeh)
                const cellDate = new Date(firstDate);
                cellDate.setDate(cellDate.getDate() + (i - offset));
                const dayOfWeekJS = cellDate.getDay();
                const isFriday = (dayOfWeekJS === 5);

                // Check if today
                const isToday = (jYear === today.jy && jMonth === today.jm && day === today.jd && !isOtherMonth);

                // Check if selected
                const isSelected = (selectedDate &&
                    cellJYear === selectedDate.jy &&
                    cellJMonth === selectedDate.jm &&
                    day === selectedDate.jd &&
                    !isOtherMonth);

                days.push({
                    day,
                    isOtherMonth,
                    isFriday,
                    isToday,
                    isSelected,
                    jYear: cellJYear,
                    jMonth: cellJMonth,
                    jd: day
                });
            }

            // Render
            daysGrid.innerHTML = '';
            days.forEach(cell => {
                const div = document.createElement('div');
                div.className = 'day-cell';
                if (cell.isOtherMonth) div.classList.add('other-month');
                if (cell.isFriday) div.classList.add('friday');
                if (cell.isToday) div.classList.add('today');
                if (cell.isSelected) div.classList.add('selected');
                div.textContent = cell.day;

                // Click handler
                div.addEventListener('click', function() {
                    if (cell.isOtherMonth) {
                        // Navigate to that month
                        renderCalendar(cell.jYear, cell.jMonth);
                        // Then select the day after render
                        setTimeout(() => {
                            selectDate(cell.jYear, cell.jMonth, cell.jd);
                        }, 10);
                    } else {
                        selectDate(cell.jYear, cell.jMonth, cell.jd);
                    }
                });

                daysGrid.appendChild(div);
            });

            // Update month/year display
            monthYearDisplay.textContent = `${getMonthName(jMonth)} ${jYear}`;

            // Update today's info
            const todayJ = getToday();
            const todayDateStr = `${todayJ.jy}/${String(todayJ.jm + 1).padStart(2, '0')}/${String(todayJ.jd).padStart(2, '0')}`;
            todayDateDisplay.textContent = todayDateStr;
            const wd = getWeekdayName(0, todayJ.jy, todayJ.jm, todayJ.jd);
            weekdayDisplay.textContent = wd;

            // Update selected display
            if (selectedDate) {
                const selStr = `${selectedDate.jy}/${String(selectedDate.jm + 1).padStart(2, '0')}/${String(selectedDate.jd).padStart(2, '0')}`;
                const wdSel = getWeekdayName(0, selectedDate.jy, selectedDate.jm, selectedDate.jd);
                selectedDateText.textContent = `${selStr} (${wdSel})`;
            } else {
                selectedDateText.textContent = 'هیچ';
            }

            // Store current state
            currentJYear = jYear;
            currentJMonth = jMonth;
        }

        // ---------- SELECT DATE ----------
        function selectDate(jy, jm, jd) {
            selectedDate = { jy, jm, jd };
            renderCalendar(currentJYear, currentJMonth);
        }

        // ---------- NAVIGATION ----------
        function goToToday() {
            const today = getToday();
            selectedDate = null;
            renderCalendar(today.jy, today.jm);
            // Auto-select today
            setTimeout(() => {
                selectDate(today.jy, today.jm, today.jd);
            }, 10);
        }

        function goToPrevMonth() {
            let newMonth = currentJMonth - 1;
            let newYear = currentJYear;
            if (newMonth < 0) {
                newMonth = 11;
                newYear--;
            }
            selectedDate = null;
            renderCalendar(newYear, newMonth);
        }

        function goToNextMonth() {
            let newMonth = currentJMonth + 1;
            let newYear = currentJYear;
            if (newMonth > 11) {
                newMonth = 0;
                newYear++;
            }
            selectedDate = null;
            renderCalendar(newYear, newMonth);
        }

        // ---------- EVENT LISTENERS ----------
        prevMonthBtn.addEventListener('click', goToPrevMonth);
        nextMonthBtn.addEventListener('click', goToNextMonth);
        todayBtn.addEventListener('click', goToToday);

        // ---------- KEYBOARD SUPPORT ----------
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { goToNextMonth();
                e.preventDefault(); }
            if (e.key === 'ArrowLeft') { goToPrevMonth();
                e.preventDefault(); }
            if (e.key === 't' || e.key === 'T') { goToToday();
                e.preventDefault(); }
        });

        // ---------- INIT ----------
        // Start with today's date
        const today = getToday();
        currentJYear = today.jy;
        currentJMonth = today.jm;
        renderCalendar(currentJYear, currentJMonth);
        // Auto-select today
        setTimeout(() => {
            selectDate(today.jy, today.jm, today.jd);
        }, 50);

        console.log('🗓️ Persian Calendar v2.0.0 by KnoX | Good Luck <3');
    </script>

</body>
</html>
