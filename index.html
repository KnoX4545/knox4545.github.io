<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HopDog 2.0</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='iconGrad' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23fcd34d'/%3E%3Cstop offset='50%25' stop-color='%23f59e0b'/%3E%3Cstop offset='100%25' stop-color='%23d97706'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23iconGrad)'/%3E%3Cellipse cx='50' cy='62' rx='20' ry='18' fill='%23fcd34d' stroke='%23b45309' stroke-width='2'/%3E%3Cellipse cx='32' cy='40' rx='12' ry='13' fill='%23fcd34d' stroke='%23b45309' stroke-width='2' transform='rotate(-22,32,40)'/%3E%3Cellipse cx='50' cy='34' rx='12' ry='13' fill='%23fcd34d' stroke='%23b45309' stroke-width='2'/%3E%3Cellipse cx='68' cy='40' rx='12' ry='13' fill='%23fcd34d' stroke='%23b45309' stroke-width='2' transform='rotate(22,68,40)'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <div class="header-left">
                <div class="header-avatar">
                    <svg viewBox="0 0 100 100">
                        <ellipse cx="50" cy="62" rx="22" ry="20" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
                        <ellipse cx="30" cy="38" rx="13" ry="14" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" transform="rotate(-25,30,38)"/>
                        <ellipse cx="50" cy="32" rx="13" ry="14" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
                        <ellipse cx="70" cy="38" rx="13" ry="14" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" transform="rotate(25,70,38)"/>
                    </svg>
                </div>
                <div class="header-info">
                    <div class="name">HopDog</div>
                    <div class="status"><span class="online">●</span> Online</div>
                </div>
            </div>
            <svg class="paw-header-svg" viewBox="0 0 100 100">
                <defs>
                    <radialGradient id="pg" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
                        <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
                    </radialGradient>
                    <linearGradient id="pg2" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#fbbf24"/>
                        <stop offset="50%" stop-color="#f59e0b"/>
                        <stop offset="100%" stop-color="#d97706"/>
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="48" fill="url(#pg)"/>
                <ellipse cx="50" cy="62" rx="22" ry="20" fill="url(#pg2)" stroke="#b45309" stroke-width="1.5"/>
                <ellipse cx="30" cy="38" rx="13" ry="14" fill="url(#pg2)" stroke="#b45309" stroke-width="1.5" transform="rotate(-25,30,38)"/>
                <ellipse cx="50" cy="32" rx="13" ry="14" fill="url(#pg2)" stroke="#b45309" stroke-width="1.5"/>
                <ellipse cx="70" cy="38" rx="13" ry="14" fill="url(#pg2)" stroke="#b45309" stroke-width="1.5" transform="rotate(25,70,38)"/>
                <ellipse cx="50" cy="62" rx="12" ry="10" fill="#fcd34d" opacity="0.25"/>
                <ellipse cx="34" cy="40" rx="6" ry="6" fill="#fcd34d" opacity="0.15"/>
                <ellipse cx="50" cy="34" rx="6" ry="6" fill="#fcd34d" opacity="0.15"/>
                <ellipse cx="66" cy="40" rx="6" ry="6" fill="#fcd34d" opacity="0.15"/>
                <text x="78" y="22" font-size="16" fill="#fbbf24" opacity="0.5">✦</text>
                <text x="15" y="24" font-size="12" fill="#fbbf24" opacity="0.3">✦</text>
            </svg>
        </div>

        <div class="chat" id="chat">
            <div class="date-divider">Today</div>
        </div>

        <div class="input-area">
            <input type="text" id="cmdInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendCmd()" autofocus />
            <button class="send-btn" onclick="sendCmd()">Send</button>
        </div>

        <div class="footer">
            <div class="main-line">
                <span class="brand">KnoX</span>
                <span class="sep">✦</span>
                <span class="brand">Dillimore</span>
            </div>
            <div class="sub-line">
                Built with <span class="heart-icon">❤</span> by <span class="brand">KnoX</span> &amp; <span class="ai">AI</span>
            </div>
            <div class="version">Version 2.0.0</div>
        </div>
    </div>

    <script src="commands.js"></script>
    <script src="core.js"></script>
    <script src="app.js"></script>
</body>
</html>
