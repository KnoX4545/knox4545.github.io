<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HopDog</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cellipse cx='50' cy='62' rx='22' ry='20' fill='%23fbbf24' stroke='%23d97706' stroke-width='1.5'/%3E%3Cellipse cx='30' cy='38' rx='13' ry='14' fill='%23fbbf24' stroke='%23d97706' stroke-width='1.5' transform='rotate(-25, 30, 38)'/%3E%3Cellipse cx='50' cy='32' rx='13' ry='14' fill='%23fbbf24' stroke='%23d97706' stroke-width='1.5'/%3E%3Cellipse cx='70' cy='38' rx='13' ry='14' fill='%23fbbf24' stroke='%23d97706' stroke-width='1.5' transform='rotate(25, 70, 38)'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --tg-bg: #0a0a0f;
            --tg-header: #12121a;
            --tg-chat-bg: #0d0d14;
            --tg-bubble-user: #1a7a3a;
            --tg-bubble-bot: #1a1a24;
            --tg-bubble-system: #14141e;
            --tg-text-primary: #f0eede;
            --tg-text-secondary: #b8b5a8;
            --tg-text-muted: #6a6858;
            --tg-accent: #1a7a3a;
            --tg-accent-hover: #228a44;
            --tg-border: #2a2838;
            --tg-input-bg: #12121a;
            --tg-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
            --tg-radius: 12px;
            --tg-radius-bubble: 16px;
            --tg-transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --tg-font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --gold-grad: linear-gradient(135deg, #fcd34d, #f59e0b, #d97706);
            --gold-glow: 0 0 40px rgba(251, 191, 36, 0.15);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --tg-bg: #f0ece6;
                --tg-header: #e8e4de;
                --tg-chat-bg: #e0dcd6;
                --tg-bubble-user: #1a7a3a;
                --tg-bubble-bot: #ffffff;
                --tg-bubble-system: #d5d1cb;
                --tg-text-primary: #1a1a16;
                --tg-text-secondary: #4a4842;
                --tg-text-muted: #8a887a;
                --tg-border: #d0ccc6;
                --tg-input-bg: #ffffff;
                --tg-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--tg-bg);
            font-family: var(--tg-font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            color: var(--tg-text-secondary);
            line-height: 1.6;
            transition: background var(--tg-transition), color var(--tg-transition);
            overflow: hidden;
        }

        .container {
            background: var(--tg-bg);
            max-width: 480px;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--tg-shadow);
            position: relative;
            overflow: hidden;
            transition: background var(--tg-transition);
        }

        .header {
            background: var(--tg-header);
            padding: 14px 18px 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--tg-border);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
            transition: background var(--tg-transition), border-color var(--tg-transition);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gold-grad);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            animation: avatarPulse 4s ease-in-out infinite;
            box-shadow: var(--gold-glow);
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
            50% { box-shadow: 0 0 50px rgba(251, 191, 36, 0.25); }
        }

        .header-avatar svg { width: 28px; height: 28px; }

        .header-info .name {
            color: var(--tg-text-primary);
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
            transition: color var(--tg-transition);
        }

        .header-info .status {
            color: var(--tg-text-muted);
            font-size: 11px;
            font-weight: 400;
        }

        .header-info .status .online { color: var(--tg-accent); }

        .paw-header-svg {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 0 16px rgba(251, 191, 36, 0.1));
            animation: pawFloat 3s ease-in-out infinite;
            cursor: default;
            flex-shrink: 0;
        }

        @keyframes pawFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(-3deg); }
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px 10px 14px;
            background: var(--tg-chat-bg);
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background var(--tg-transition);
            scroll-behavior: smooth;
        }

        .chat::-webkit-scrollbar { width: 4px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb { background: var(--tg-border); border-radius: 4px; }

        .msg {
            max-width: 88%;
            padding: 8px 14px;
            border-radius: var(--tg-radius-bubble);
            font-size: 14px;
            line-height: 1.7;
            animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            word-wrap: break-word;
            position: relative;
            opacity: 0;
            transform: translateY(16px) scale(0.96);
        }

        @keyframes msgIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg.system {
            background: var(--tg-bubble-system);
            color: var(--tg-text-muted);
            font-size: 12px;
            text-align: center;
            max-width: 100%;
            border-radius: 8px;
            padding: 6px 16px;
            align-self: center;
            margin: 2px 0;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: background var(--tg-transition), color var(--tg-transition);
        }

        .msg.user {
            background: var(--tg-bubble-user);
            color: var(--tg-text-primary);
            align-self: flex-end;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(26, 122, 58, 0.2);
        }

        .msg.bot {
            background: var(--tg-bubble-bot);
            color: var(--tg-text-secondary);
            align-self: flex-start;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: background var(--tg-transition), color var(--tg-transition);
        }

        .msg .gold { color: #fbbf24; font-weight: 600; }
        .msg .pink { color: #ec4899; font-weight: 600; }
        .msg .blue { color: #3b82f6; font-weight: 600; }
        .msg .green { color: #22c55e; font-weight: 600; }
        .msg .purple { color: #8b5cf6; font-weight: 600; }
        .msg .red { color: #f87171; font-weight: 600; }
        .msg .cyan { color: #67e8f9; font-weight: 600; }
        .msg .bold { font-weight: 700; }

        .msg .hop-text {
            display: inline-block;
            background: var(--gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            font-size: 16px;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.08);
        }

        .msg .msg-time {
            font-size: 9px;
            color: var(--tg-text-muted);
            margin-top: 4px;
            display: block;
            text-align: left;
            opacity: 0.4;
        }

        .msg.user .msg-time { text-align: right; }

        .date-divider {
            text-align: center;
            font-size: 11px;
            color: var(--tg-text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            align-self: center;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: color var(--tg-transition), border-color var(--tg-transition);
        }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 8px 14px 12px 14px;
            background: var(--tg-header);
            border-top: 1px solid var(--tg-border);
            flex-shrink: 0;
            align-items: center;
            transition: background var(--tg-transition), border-color var(--tg-transition);
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            background: var(--tg-input-bg);
            border: 1px solid var(--tg-border);
            border-radius: 24px;
            color: var(--tg-text-primary);
            font-family: var(--tg-font);
            font-size: 14px;
            outline: none;
            transition: all var(--tg-transition);
        }

        .input-area input:focus {
            border-color: var(--tg-accent);
            box-shadow: 0 0 0 3px rgba(26, 122, 58, 0.12);
        }

        .input-area input::placeholder { color: var(--tg-text-muted); font-size: 13px; }

        .input-area .send-btn {
            padding: 10px 20px;
            background: var(--tg-accent);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--tg-font);
            font-size: 14px;
            transition: all var(--tg-transition);
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .input-area .send-btn:hover { background: var(--tg-accent-hover); transform: scale(0.97); }

        .footer {
            text-align: center;
            padding: 8px 0 10px 0;
            background: var(--tg-bg);
            flex-shrink: 0;
            border-top: 1px solid var(--tg-border);
            transition: background var(--tg-transition), border-color var(--tg-transition);
        }

        .footer .main-line {
            font-size: 11px;
            font-weight: 600;
            color: var(--tg-text-primary);
            letter-spacing: 0.3px;
            transition: color var(--tg-transition);
        }

        .footer .main-line .brand {
            background: var(--gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .footer .main-line .sep {
            color: var(--tg-text-muted);
            opacity: 0.4;
            margin: 0 4px;
        }

        .footer .sub-line {
            font-size: 9px;
            color: var(--tg-text-muted);
            margin-top: 2px;
            opacity: 0.5;
            letter-spacing: 0.2px;
            transition: color var(--tg-transition);
        }

        .footer .sub-line .ai { color: #60a5fa; opacity: 0.7; }

        .footer .version {
            font-size: 8px;
            color: var(--tg-text-muted);
            margin-top: 1px;
            opacity: 0.3;
            letter-spacing: 0.5px;
            transition: color var(--tg-transition);
        }

        .glass-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 7px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--tg-text-primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent);
            pointer-events: none;
        }

        .glass-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .glass-btn:active { transform: scale(0.95); }

        .glass-btn.confirm {
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        .glass-btn.confirm:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.35);
        }

        .glass-btn.cancel {
            background: rgba(248, 113, 113, 0.12);
            border-color: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }
        .glass-btn.cancel:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: rgba(248, 113, 113, 0.35);
        }

        .glass-btn.sell {
            background: rgba(251, 191, 36, 0.1);
            border-color: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        .glass-btn.sell:hover {
            background: rgba(251, 191, 36, 0.18);
            border-color: rgba(251, 191, 36, 0.35);
        }

        .hapo-btn {
            background: rgba(251, 191, 36, 0.06) !important;
            border-color: rgba(251, 191, 36, 0.15) !important;
            color: #fbbf24 !important;
        }
        .hapo-btn:hover {
            background: rgba(251, 191, 36, 0.12) !important;
            border-color: rgba(251, 191, 36, 0.3) !important;
        }

        .hunt-dots {
            display: inline-block;
            font-size: 20px;
            letter-spacing: 4px;
        }

        .levelup-flash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15), transparent 70%);
            pointer-events: none;
            z-index: 998;
            animation: flashOut 1.2s ease forwards;
        }

        @keyframes flashOut {
            0% { opacity: 1; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
        }

        .levelup-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            font-size: 34px;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 50px rgba(251, 191, 36, 0.5);
            animation: titlePop 1.2s ease forwards;
            pointer-events: none;
            opacity: 0;
            text-align: center;
            line-height: 1.3;
        }

        @keyframes titlePop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            60% { transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
        }

        .hapo-jump { animation: hapoJump 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes hapoJump {
            0% { transform: scale(1) rotate(0deg); }
            30% { transform: scale(1.3) rotate(-10deg); }
            60% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .hunt-animation {
            display: inline-block;
            animation: huntPulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes huntPulse {
            0% { transform: scale(1) rotate(0deg) opacity: 0.6; }
            100% { transform: scale(1.15) rotate(8deg) opacity: 1; }
        }

        .gold-pulse { animation: goldPulse 0.7s ease; }

        @keyframes goldPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #fbbf24; }
            100% { transform: scale(1); }
        }

        .academy-icon {
            display: inline-block;
            font-size: 28px;
            margin: 0 4px;
            vertical-align: middle;
        }

        .academy-nav-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 6px;
        }

        .academy-nav-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--tg-text-secondary);
            font-family: var(--tg-font);
        }

        .academy-nav-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--tg-text-primary);
        }

        @media (max-width: 520px) {
            .container { max-height: 100vh; height: 100vh; border-radius: 0; }
            .header { padding: 12px 14px 8px 14px; }
            .header-info .name { font-size: 15px; }
            .paw-header-svg { width: 30px; height: 30px; }
            .chat { padding: 8px 12px 8px 12px; }
            .msg { font-size: 13px; padding: 6px 12px; max-width: 92%; }
            .input-area { padding: 6px 12px 10px 12px; gap: 6px; }
            .input-area input { font-size: 13px; padding: 8px 14px; }
            .input-area .send-btn { font-size: 13px; padding: 8px 16px; }
            .header-avatar { width: 34px; height: 34px; }
            .header-avatar svg { width: 24px; height: 24px; }
            .glass-btn { font-size: 13px; padding: 5px 14px; }
            .levelup-title { font-size: 24px; }
            .academy-icon { font-size: 22px; }
            .academy-nav-btn { font-size: 11px; padding: 3px 12px; }
        }

        @media (max-width: 380px) {
            .msg { font-size: 12px; max-width: 95%; }
            .glass-btn { font-size: 11px; padding: 4px 10px; }
            .levelup-title { font-size: 20px; }
            .academy-icon { font-size: 18px; }
            .academy-nav-btn { font-size: 10px; padding: 2px 10px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">

    <div class="header">
        <div class="header-left">
            <div class="header-avatar">
                <svg viewBox="0 0 100 100">
                    <ellipse cx="50" cy="62" rx="22" ry="20" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
                    <ellipse cx="30" cy="38" rx="13" ry="14" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" transform="rotate(-25, 30, 38)"/>
                    <ellipse cx="50" cy="32" rx="13" ry="14" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
                    <ellipse cx="70" cy="38" rx="13" ry="14" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" transform="rotate(25, 70, 38)"/>
                </svg>
            </div>
            <div class="header-info">
                <div class="name">HopDog</div>
                <div class="status"><span class="online">●</span> Online</div>
            </div>
        </div>
        <svg class="paw-header-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="pawGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.1"/>
                    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
                </radialGradient>
                <linearGradient id="pawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fbbf24"/>
                    <stop offset="50%" stop-color="#f59e0b"/>
                    <stop offset="100%" stop-color="#d97706"/>
                </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="48" fill="url(#pawGlow)"/>
            <ellipse cx="50" cy="62" rx="22" ry="20" fill="url(#pawGrad)" stroke="#b45309" stroke-width="1.5"/>
            <ellipse cx="30" cy="38" rx="13" ry="14" fill="url(#pawGrad)" stroke="#b45309" stroke-width="1.5" transform="rotate(-25, 30, 38)"/>
            <ellipse cx="50" cy="32" rx="13" ry="14" fill="url(#pawGrad)" stroke="#b45309" stroke-width="1.5"/>
            <ellipse cx="70" cy="38" rx="13" ry="14" fill="url(#pawGrad)" stroke="#b45309" stroke-width="1.5" transform="rotate(25, 70, 38)"/>
            <ellipse cx="50" cy="62" rx="12" ry="10" fill="#fcd34d" opacity="0.3"/>
            <ellipse cx="34" cy="40" rx="6" ry="6" fill="#fcd34d" opacity="0.2"/>
            <ellipse cx="50" cy="34" rx="6" ry="6" fill="#fcd34d" opacity="0.2"/>
            <ellipse cx="66" cy="40" rx="6" ry="6" fill="#fcd34d" opacity="0.2"/>
            <text x="78" y="22" font-size="16" fill="#fbbf24" opacity="0.6">✦</text>
            <text x="15" y="24" font-size="12" fill="#fbbf24" opacity="0.4">✦</text>
        </svg>
    </div>

    <div class="chat" id="chat">
        <div class="date-divider">Today</div>
    </div>

    <div class="input-area">
        <input type="text" id="cmdInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendCmd()" autofocus />
        <button class="send-btn" onclick="sendCmd()">Send</button>
    </div>

    <div class="footer">
        <div class="main-line">
            <span class="brand">KnoX</span>
            <span class="sep">✦</span>
            <span class="brand">Dillimore</span>
        </div>
        <div class="sub-line">
            Built with <span style="color:#f87171;">❤</span> by <span class="brand">KnoX</span> &amp; <span class="ai">AI</span>
        </div>
        <div class="version">Version 1.8.0</div>
    </div>

</div>

// ================================================================
// HELPERS
// ================================================================
function getHapoTotalLevel() { return hapoRank * 5 + hapoLevel; }
function getHapoMaxFood() { return (hapoRank + 1) * 4; }
function getHapoCapacity() { return HAPO_CAPACITY[getHapoTotalLevel()] || 500; }
function getHapoProduction() { return HAPO_PRODUCTION[getHapoTotalLevel()] || 0.1; }
function getHapoUpgradePrice() {
    const total = getHapoTotalLevel();
    if (total >= 25) return Infinity;
    return HAPO_LEVEL_PRICES[total + 1] || 10000000;
}
function getHapoFoodStatus() {
    const max = getHapoMaxFood();
    if (hapoFood === 0) return { text: 'دیگه کار نمیکنم', speed: 0 };
    if (hapoFood / max < 0.25) return { text: 'من گشنمه', speed: 0.5 };
    if (hapoFood / max < 0.75) return { text: 'شکمم پره', speed: 1.0 };
    return { text: 'عاشقتم', speed: 1.5 };
}
function getLevelData(l) { return LEVEL_DATA[l] || LEVEL_DATA[1]; }
function getRequiredForLevel(l) { return l >= MAX_LEVEL ? Infinity : getLevelData(l + 1).required; }
function getCooldownForLevel(l) { return getLevelData(l).cooldown; }
function getClawData(l) { return CLAW_DATA[l] || null; }
function getClawCost(l) { const d = getClawData(l); return d ? d.cost : Infinity; }
function getClawCooldown(l) { const d = getClawData(l); return d ? d.cooldown : Infinity; }
function getClawChances(l) {
    const d = getClawData(l);
    return d ? { common: d.common, uncommon: d.uncommon, epic: d.epic || 0, legendary: d.legendary || 0 } : { common: 0, uncommon: 0, epic: 0, legendary: 0 };
}
function getRarityIcon(r) { return RARITY_ICONS[r] || ''; }

// ================================================================
// LEVEL UP ANIMATION
// ================================================================
function triggerLevelUpAnimation(level) {
    const flash = document.createElement('div');
    flash.className = 'levelup-flash';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 1300);
    
    const title = document.createElement('div');
    title.className = 'levelup-title';
    title.innerHTML = '🎊<br/>سطح ' + level + '!';
    document.body.appendChild(title);
    setTimeout(() => title.remove(), 1500);
    
    const container = document.createElement('div');
    container.className = 'confetti-container';
    document.body.appendChild(container);
    const colors = ['#fbbf24', '#f59e0b', '#ec4899', '#3b82f6', '#22c55e', '#8b5cf6', '#f87171', '#67e8f9'];
    for (let i = 0; i < 50; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (Math.random() * 8 + 4) + 'px';
        el.style.height = (Math.random() * 8 + 4) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(el);
    }
    setTimeout(() => container.remove(), 3500);
}

function triggerHapoJump() {
    const el = document.querySelector('.hapo-jump');
    if (el) { el.classList.remove('hapo-jump'); void el.offsetWidth; el.classList.add('hapo-jump'); }
}

// ================================================================

    const now = Date.now();
    const elapsed = (now - hapoLastUpdate) / 1000;
    const capacity = getHapoCapacity();
    const status = getHapoFoodStatus();
    
    if (hapoFood > 0 && hapoHarvest < capacity) {
        const gained = getHapoProduction() * status.speed * elapsed;
        hapoHarvest = Math.min(capacity, hapoHarvest + gained);
    }
    if (hapoFood > 0) {
        const decay = Math.floor((elapsed / (12 * 3600)) * 6);
        if (decay > 0) hapoFood = Math.max(0, Math.floor(hapoFood - decay));
    }
    hapoLastUpdate = now;
}

const SAVE_KEY = 'hopdog_data';
function saveGame() {
    try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
            HopPoint, lastHopTime, Level, HopCount, PlayerName, hasVisited: true,
            isAdmin, clawLevel, lastHuntTime,
            hapoOwned, hapoName, hapoRank, hapoLevel, hapoFood, hapoHarvest, hapoLastUpdate
        }));
    } catch(e) {}
}
function loadGame() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const d = JSON.parse(raw);
        HopPoint = d.HopPoint || 0; lastHopTime = d.lastHopTime || 0;
        Level = d.Level || 1; HopCount = d.HopCount || 0;
        PlayerName = d.PlayerName || ''; isAdmin = d.isAdmin || false;
        clawLevel = d.clawLevel || 0; lastHuntTime = d.lastHuntTime || 0;
        hapoOwned = d.hapoOwned || false; hapoName = d.hapoName || '';
        hapoRank = d.hapoRank || 0; hapoLevel = d.hapoLevel || 1;
        hapoFood = d.hapoFood || getHapoMaxFood();
        hapoHarvest = d.hapoHarvest || 0; hapoLastUpdate = d.hapoLastUpdate || Date.now();
        return true;
    } catch(e) { return false; }
}

// ================================================================
// HAPO MENU
// ================================================================
function showHapoMenu() {
    if (!hapoOwned) {
        if (Level < 3) { addBot(S.hapo + ' <span class="gold">هاپو از سطح 3 باز میشود</span>'); return; }
        const cost = 300;
        if (HopPoint < cost) { addBot(S.hapo + ' <span class="gold">برای خرید هاپو به 300 ' + S.hopoCoin + ' نیاز داری</span>'); return; }
        addBotWithGlassButtons(
            S.hapo + ' <span class="gold">خرید هاپو</span><br/>💰 هزینه : <span class="gold">' + cost + '</span> ' + S.hopoCoin + '<br/>آیا میخوای هاپو بخری؟',
            function() {
                if (HopPoint < 300) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست'); return; }
                HopPoint -= 300; hapoOwned = true;
                hapoName = HAPO_NAMES[Math.floor(Math.random() * HAPO_NAMES.length)];
                hapoRank = 0; hapoLevel = 1; hapoFood = getHapoMaxFood(); hapoHarvest = 0; hapoLastUpdate = Date.now();
                saveGame();
                addBot(S.hapo + ' ✅ <span class="gold">هاپو خریداری شد</span><br/>اسم هاپو : <span class="gold">' + hapoName + '</span>');
                triggerHapoJump();
                showHapoMenu();
            },
            function() { addBot('❌ خرید هاپو لغو شد'); }
        );
        return;
    }
    
    updateHapoProduction();
    const total = getHapoTotalLevel();
    const maxFood = getHapoMaxFood();
    const capacity = getHapoCapacity();
    const status = getHapoFoodStatus();
    const prod = getHapoProduction();
    const price = getHapoUpgradePrice();
    const isMaxLevel = total >= 25;
    
    let msg = S.hapo + ' <span class="gold">' + hapoName + '</span><br/>';
    msg += '💕 نام : ' + hapoName + '<br/>';
    msg += S.food + ' شکم : ' + status.text + ' (' + Math.floor(hapoFood) + '/' + maxFood + ')<br/>';
    msg += '🌟 مقام : ' + RANK_NAMES[hapoRank] + ' (' + hapoRank + ')<br/>';
    msg += '⭐️ سطح : ' + hapoLevel + '/5<br/>';
    msg += S.hopoCoin + ' هاپو پوینت های تولید شده : ' + Math.floor(hapoHarvest) + '<br/>';
    msg += '💫 تولید در ثانیه : ' + prod.toFixed(2) + '<br/>';
    msg += '📦 ظرفیت : ' + capacity.toLocaleString() + '<br/>';
    if (!isMaxLevel) msg += '💰 هزینه ارتقا : ' + price.toLocaleString();
    else msg += '🏆 مقام نهایی';
    
    const btnContainer = document.createElement('div');
    btnContainer.className = 'glass-buttons';
    
    const harvestBtn = document.createElement('button');
    harvestBtn.className = 'glass-btn hapo-btn';
    harvestBtn.innerHTML = S.harvest + ' برداشت';
    harvestBtn.onclick = function(e) {
        e.stopPropagation();
        const amount = Math.floor(hapoHarvest);
        if (amount > 0) { HopPoint += amount; hapoHarvest = 0; saveGame(); addBot(S.hopoCoin + ' ✅ <span class="gold">' + amount.toLocaleString() + '</span> هاپو پوینت برداشت شد'); }
        else { addBot('❌ هیچ هاپو پوینتی برای برداشت نیست'); }
    };
    
    const upgradeBtn = document.createElement('button');
    upgradeBtn.className = 'glass-btn hapo-btn';
    if (isMaxLevel) {
        upgradeBtn.innerHTML = '🏆 نهایی';
        upgradeBtn.style.opacity = '0.5';
        upgradeBtn.onclick = function() { addBot('🏆 هاپو در بالاترین سطح است'); };
    } else if (hapoLevel >= 5 && hapoRank < 4) {
        upgradeBtn.innerHTML = S.upgrade + ' ارتقا مقام';
        upgradeBtn.onclick = function(e) {
            e.stopPropagation();
            if (HopPoint < price) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست (نیاز به ' + price.toLocaleString() + ' ' + S.hopoCoin + ')'); return; }
            addBotWithGlassButtons(
                '⚠️ <span class="gold">هشدار ارتقا مقام</span><br/>⭐ مقام فعلی : ' + RANK_NAMES[hapoRank] + ' (' + hapoRank + ')<br/>⭐ مقام بعدی : ' + RANK_NAMES[hapoRank + 1] + ' (' + (hapoRank + 1) + ')<br/>📌 سطح فعلی : ' + hapoLevel + '/5<br/>📌 بعد از ارتقا سطح به 1 برمیگردد و همه چیز ریست میشود<br/>💰 هزینه : ' + price.toLocaleString() + ' ' + S.hopoCoin + '<br/>آیا مطمئنی میخوای مقام هاپو رو ارتقا بدی؟',
                function() {
                    if (HopPoint < price) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست'); return; }
                    HopPoint -= price; hapoRank++; hapoLevel = 1; hapoFood = getHapoMaxFood(); hapoHarvest = 0;
                    saveGame();
                    addBot(S.sparkle + ' ✅ <span class="gold">مقام هاپو به ' + RANK_NAMES[hapoRank] + ' ارتقا یافت</span>');
                    triggerHapoJump();
                    showHapoMenu();
                },
                function() { addBot('❌ ارتقا مقام لغو شد'); }
            );
        };
    } else {
        upgradeBtn.innerHTML = S.upgrade + ' ارتقا سطح';
        upgradeBtn.onclick = function(e) {
            e.stopPropagation();
            if (HopPoint < price) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست (نیاز به ' + price.toLocaleString() + ' ' + S.hopoCoin + ')'); return; }
            addBotWithGlassButtons(
                S.upgrade + ' آیا مطمئنی میخوای سطح هاپو رو ارتقا بدی؟<br/>💰 هزینه : ' + price.toLocaleString() + ' ' + S.hopoCoin,
                function() {
                    if (HopPoint < price) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست'); return; }
                    HopPoint -= price; hapoLevel++;
                    hapoFood = Math.min(getHapoMaxFood(), Math.floor(hapoFood + 2));
                    saveGame();
                    addBot(S.sparkle + ' ✅ <span class="gold">سطح هاپو به ' + hapoLevel + ' ارتقا یافت</span>');
                    triggerHapoJump();
                    showHapoMenu();
                },
                function() { addBot('❌ ارتقا سطح لغو شد'); }
            );
        };
    }
    
    const nameBtn = document.createElement('button');
    nameBtn.className = 'glass-btn hapo-btn';
    nameBtn.innerHTML = S.namechange + ' تغییر اسم';
    nameBtn.onclick = function(e) {
        e.stopPropagation();
        if (HopPoint < 750) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست (نیاز به 750 ' + S.hopoCoin + ')'); return; }
        addBotWithGlassButtons(
            S.namechange + ' آیا مطمئنی میخوای اسم هاپو رو عوض کنی؟<br/>💰 هزینه : 750 ' + S.hopoCoin,
            function() {
                if (HopPoint < 750) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست'); return; }
                HopPoint -= 750;
                addBot('✏️ اسم جدید هاپو را وارد کن');
                waitingForHapoName = true;
            },
            function() { addBot('❌ تغییر اسم لغو شد'); }
        );
    };
    
    btnContainer.appendChild(harvestBtn);
    btnContainer.appendChild(upgradeBtn);
    btnContainer.appendChild(nameBtn);
    const div = addBotAndReturn(msg);
    div.appendChild(btnContainer);
}

function showClawMenu() {
    if (Level < 2) { addBot(S.error + ' قابلیت پنجه از سطح 2 باز میشود'); return; }
    if (clawLevel === 0) {
        const cost = getClawCost(1);
        const msg = S.claw + ' <span class="gold">شما پنجه ندارید</span><br/>برای شروع شکار باید پنجه بخرید<br/>💰 هزینه خرید سطح 1 : <span class="gold">' + cost + '</span> ' + S.hopoCoin + '<br/>' + S.clock + ' زمان استراحت : 60:00<br/>🍀 شانس شکار :<br/>  ' + getRarityIcon('common') + ' معمولی : 95%<br/>  ' + getRarityIcon('uncommon') + ' کمیاب : 5%';
        addBotWithGlassButtons(msg, function() { buyClawAction(); }, function() { addBot('❌ خرید پنجه لغو شد'); });
        return;
    }
    const data = getClawData(clawLevel);
    const nextLevel = clawLevel + 1;
    const nextData = getClawData(nextLevel);
    let msg = S.claw + ' <span class="gold">پنجه شما</span><br/>⭐ سطح : <span class="gold">' + clawLevel + '</span><br/>' + S.clock + ' زمان استراحت : ' + String(data.cooldown).padStart(2, '0') + ':00<br/>🍀 شانس شکار :<br/>  ' + getRarityIcon('common') + ' معمولی : ' + data.common + '%<br/>  ' + getRarityIcon('uncommon') + ' کمیاب : ' + data.uncommon + '%<br/>';
    if (data.epic > 0) msg += '  ' + getRarityIcon('epic') + ' حماسی : ' + data.epic + '%<br/>';
    if (data.legendary > 0) msg += '  ' + getRarityIcon('legendary') + ' افسانه‌ای : ' + data.legendary + '%<br/>';
    if (nextData) {
        msg += '〰️〰️〰️〰️〰️〰️〰️<br/>' + S.upgrade + ' ارتقا به سطح ' + nextLevel + '<br/>💰 هزینه : <span class="gold">' + nextData.cost + '</span> ' + S.hopoCoin;
        addBotWithGlassButtons(msg, function() { upgradeClawAction(nextLevel, nextData.cost); }, function() { addBot('❌ ارتقا پنجه لغو شد'); });
    } else {
        msg += '〰️〰️〰️〰️〰️〰️〰️<br/>🏆 سطح نهایی';
        addBot(msg);
    }
}

function buyClawAction() {
    const cost = getClawCost(1);
    if (HopPoint < cost) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست (نیاز به ' + cost + ' ' + S.hopoCoin + ')'); return; }
    HopPoint -= cost; clawLevel = 1; saveGame();
    addBot(S.claw + ' ✅ <span class="gold">پنجه خریداری شد</span><br/>اکنون میتونی با زدن <span class="gold">شکار</span> به شکار بری<br/>برای ارتقا پنجه، دوباره <span class="gold">پنجه</span> بزن');
}

function upgradeClawAction(nextLevel, cost) {
    if (HopPoint < cost) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست (نیاز به ' + cost + ' ' + S.hopoCoin + ')'); return; }
    HopPoint -= cost; clawLevel = nextLevel; saveGame();
    addBot(S.upgrade + ' ✅ <span class="gold">پنجه به سطح ' + clawLevel + ' ارتقا یافت</span> ' + S.sparkle);
}

// ================================================================
// HUNTING
// ================================================================
function getRandomAnimal() {
    if (clawLevel === 0) return null;
    const chances = getClawChances(clawLevel);
    const rand = Math.random() * 100;
    let rarity;
    if (rand < chances.common) rarity = 'common';
    else if (rand < chances.common + chances.uncommon) rarity = 'uncommon';
    else if (rand < chances.common + chances.uncommon + chances.epic) rarity = 'epic';
    else rarity = 'legendary';
    const animals = ANIMALS[rarity];
    const animal = animals[Math.floor(Math.random() * animals.length)];
    const weight = Math.round((animal.weightMin + Math.random() * (animal.weightMax - animal.weightMin)) * 10) / 10;
    const value = Math.round(weight * animal.multiplier);
    return { ...animal, rarity, rarityName: RARITY_NAMES[rarity], rarityIcon: getRarityIcon(rarity), weight, value: Math.round(value), name: animal.name };
}

function doHunt() {
    if (Level < 2) { addBot(S.error + ' قابلیت شکار از سطح 2 باز میشود'); return; }
    if (clawLevel === 0) {
        addBot(S.claw + ' <span class="gold">شما پنجه ندارید</span><br/>برای شکار باید پنجه بخرید<br/>💰 هزینه خرید سطح 1 : <span class="gold">' + getClawCost(1) + '</span> ' + S.hopoCoin + '<br/>با زدن <span class="gold">پنجه</span> اطلاعات بیشتری ببین');
        return;
    }
    if (huntActive) { addBot(S.clock + ' در حال شکار هستی صبر کن'); return; }
    const cooldown = getClawCooldown(clawLevel) * 60 * 1000;
    const now = Date.now();
    if (lastHuntTime > 0 && (now - lastHuntTime) < cooldown) {
        const remaining = cooldown - (now - lastHuntTime);
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        const timeStr = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        addBot(S.clock + ' تا شکار بعدی ' + timeStr + ' مونده');
        return;
    }
    huntActive = true;
    lastHuntTime = now;
    const animMsg = addBotAndReturn(S.huntAnim + ' <span class="gold">در حال شکار</span> <span class="hunt-dots">...</span>');
    setTimeout(() => {
        const animal = getRandomAnimal();
        if (!animal) { editMessage(animMsg, S.error + ' خطا در شکار'); huntActive = false; return; }
        const rarityColor = RARITY_COLORS[animal.rarity] || 'gold';
        const resultHtml = S.hunt + ' <span class="gold">شما موفق به شکار شدید</span><br/>' + S.dog + ' <span class="gold">' + animal.name + '</span><br/>⭐ سطح : <span class="' + rarityColor + '">' + animal.rarityName + ' ' + animal.rarityIcon + '</span><br/>⚖️ وزن : <span class="gold">' + animal.weight + '</span> کیلو<br/>' + S.hopoCoin + ' ارزش : <span class="gold">' + animal.value + '</span> ' + S.hopoCoin + '<br/>' + S.food + ' ارزش غذایی : <span class="gold">' + animal.nutrition + '</span> کالری<br/>' + S.clock + ' 60 ثانیه فرصت انتخاب دارید';
        editMessage(animMsg, resultHtml);
        const btnContainer = document.createElement('div');
        btnContainer.className = 'glass-buttons';
        const sellBtn = document.createElement('button');
        sellBtn.className = 'glass-btn sell';
        sellBtn.innerHTML = S.hopoCoin + ' فروش';
        sellBtn.onclick = function(e) {
            e.stopPropagation();
            if (huntTimerId) { clearTimeout(huntTimerId); huntTimerId = null; }
            const confirmDiv = addBotAndReturn(S.hopoCoin + ' آیا مطمئنی میخوای <span class="gold">' + animal.name + '</span> رو به قیمت <span class="gold">' + animal.value + '</span> ' + S.hopoCoin + ' بفروشی؟');
            const confirmContainer = document.createElement('div');
            confirmContainer.className = 'glass-buttons';
            const confirmBtn = document.createElement('button');
            confirmBtn.className = 'glass-btn confirm';
            confirmBtn.innerHTML = ICONS.check + ' بله';
            confirmBtn.onclick = function(e2) {
                e2.stopPropagation();
                HopPoint = Math.round((HopPoint + animal.value) * 100) / 100;
                const soldName = animal.name, soldValue = animal.value;
                saveGame();
                editMessage(confirmDiv, S.hopoCoin + ' ✅ <span class="gold">' + soldName + '</span> فروخته شد 💰 <span class="gold">' + soldValue + '</span> ' + S.hopoCoin);
                addBot(S.hopoCoin + ' هاپو پوینت هات : <span class="gold">' + Math.round(HopPoint) + '</span> ' + S.hopoCoin);
                btnContainer.remove();
                huntActive = false;
            };
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'glass-btn cancel';
            cancelBtn.innerHTML = ICONS.cross + ' نه';
            cancelBtn.onclick = function(e2) {
                e2.stopPropagation();
                editMessage(confirmDiv, '❌ فروش لغو شد');
                btnContainer.remove();
                huntActive = false;
            };
            confirmContainer.appendChild(confirmBtn);
            confirmContainer.appendChild(cancelBtn);
            confirmDiv.appendChild(confirmContainer);
            btnContainer.remove();
        };
        const feedBtn = document.createElement('button');
        feedBtn.className = 'glass-btn hapo-btn';
        feedBtn.innerHTML = S.food + ' بده به هاپو';
        feedBtn.onclick = function(e) {
            e.stopPropagation();
            if (!hapoOwned) { addBot(S.error + ' شما هاپو ندارید'); return; }
            const maxFood = getHapoMaxFood();
            if (hapoFood >= maxFood) { addBot(S.food + ' هاپو سیر است'); return; }
            const feedAmount = animal.nutrition;
            const newFood = Math.min(maxFood, Math.floor(hapoFood + feedAmount));
            const actual = newFood - Math.floor(hapoFood);
            hapoFood = newFood;
            saveGame();
            addBot(S.food + ' ✅ <span class="gold">' + actual + '</span> غذا به هاپو داده شد');
            triggerHapoJump();
            btnContainer.remove();
            huntActive = false;
        };
        btnContainer.appendChild(sellBtn);
        btnContainer.appendChild(feedBtn);
        animMsg.appendChild(btnContainer);
        huntTimerId = setTimeout(() => {
            if (huntActive) {
                editMessage(animMsg, S.error + ' <span class="red">حیوان فرار کرد</span>');
                const btns = animMsg.querySelector('.glass-buttons');
                if (btns) btns.remove();
                huntActive = false;
                huntTimerId = null;
            }
        }, 60000);
        saveGame();
    }, 2000);
}

// ================================================================
// HOPUI
// ================================================================
function showHopUI() {
    const required = getRequiredForLevel(Level);
    let msg = '📊 <span class="bold">وضعیت هاپویی شما</span><br/>';
    msg += '👤 کاربر: <span class="gold">' + (PlayerName || 'ناشناس') + '</span>';
    if (isAdmin) msg += ' ' + S.admin + ' <span class="gold">[ادمین]</span>';
    msg += '<br/>' + S.star + ' سطح : <span class="gold">' + Level + '</span><br/>';
    if (Level < MAX_LEVEL) msg += '🐾 هاپ شمار : <span class="gold">' + HopCount + '</span>/<span class="gold">' + required + '</span><br/>';
    else msg += '🐾 هاپ شمار : <span class="gold">' + HopCount + '</span> (سطح نهایی) 🏆<br/>';
    msg += S.hopoCoin + ' هاپو پوینت هات : <span class="gold">' + Math.round(HopPoint) + '</span>';
    addBot(msg);
}

// ================================================================
// HOP
// ================================================================
function doHop() {
    const now = Date.now();
    const cooldown = getCooldownForLevel(Level);
    if (lastHopTime > 0 && (now - lastHopTime) / 1000 < cooldown) {
        const remaining = cooldown - ((now - lastHopTime) / 1000);
        const minutes = Math.floor(remaining / 60);
        const seconds = Math.floor(remaining % 60);
        const timeMsg = minutes > 0 ? minutes + ':' + (seconds < 10 ? '0' : '') + seconds : seconds + ' ثانیه';
        addBot(S.clock + ' هنوز هاپت نمیاد ...<br/>باید ' + timeMsg + ' صبر کنی');
        return;
    }
    const levelData = getLevelData(Level);
    const earned = Math.floor(Math.random() * (levelData.maxPoints - levelData.minPoints + 1)) + levelData.minPoints;
    HopPoint += earned;
    lastHopTime = now;
    HopCount += 1;
    const colors = ['gold', 'pink', 'blue', 'green', 'purple', 'red', 'cyan'];
    const c1 = colors[Math.floor(Math.random() * colors.length)];
    addBot(S.paw + ' <span class="' + c1 + '">' + earned + '</span> هاپو پوینت گرفتی ' + S.sparkle + '<br/>' + S.hopoCoin + ' هاپو پوینت هات : <span class="' + c1 + '">' + Math.round(HopPoint) + '</span><br/>' + S.clock + ' بعد از ' + Math.floor(cooldown/60) + ':00 میتونی دوباره <span class="hop-text">هاپ هاپ</span> کنی');
    const required = getRequiredForLevel(Level);
    if (Level < MAX_LEVEL && HopCount >= required) { HopCount = 0; Level += 1; doLevelUp(); }
    saveGame();
}

// ================================================================
// LEVEL UP
// ================================================================
function doLevelUp() {
    const reward = getLevelData(Level).reward;
    HopPoint += reward;
    let msg = S.levelup + ' <span class="gold">تبریک سطح شما به ' + Level + ' ارتقا یافت</span> ' + S.crown + '<br/>〰️〰️〰️〰️〰️〰️〰️<br/>🔓 قابلیت های باز شده ⬇️<br/>';
    if (Level === 2) msg += S.claw + ' پنجه (برای خرید و ارتقا)<br/>';
    if (Level === 3) msg += S.hapo + ' هاپو (قابل خرید با 300 ' + S.hopoCoin + ')<br/>';
    msg += '〰️〰️〰️〰️〰️〰️〰️<br/>' + S.hopoCoin + ' جایزه ارتقا سطح : <span class="gold">' + reward + '</span> ' + S.hopoCoin + '<br/>' + S.hopoCoin + ' هاپو پوینت هات : <span class="gold">' + Math.round(HopPoint) + '</span> ' + S.hopoCoin;
    addBot(msg);
    triggerLevelUpAnimation(Level);
    saveGame();
}

// ================================================================
// ADMIN
// ================================================================
function adminSetLevel() {
    if (!isAdmin) { addBot(S.error + ' شما ادمین نیستید'); return; }
    addBot('سطح جدید را وارد کن (1 تا 20):');
    waitingForAdminCommand = true;
    adminCommandType = 'setlevel';
}
function adminSetPoint() {
    if (!isAdmin) { addBot(S.error + ' شما ادمین نیستید'); return; }
    addBot(S.hopoCoin + ' جدید را وارد کن:');
    waitingForAdminCommand = true;
    adminCommandType = 'setpoint';
}
let waitingForAdminCommand = false, adminCommandType = '';

// ================================================================
// WELCOME & CHANGE NAME
// ================================================================
function showWelcome() {
    addSystem(S.welcome + ' به هاپ داگ خوش اومدی');
    addBot(S.game + ' ربات سرگرمی هاپ داگ<br/>' + S.dog + ' یه هاپوی بامزه<br/>کافیه <span class="hop-text">هاپ هاپ</span> کنی تا ' + S.hopoCoin + ' بگیری');
    addBot(S.paw + ' اسمت چیه (یک اسم برایه خودت انتخاب کن)؟');
    waitingForName = true;
}
function startChangeName() {
    if (HopPoint < 750) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست برای تغییر اسم (نیاز به 750 ' + S.hopoCoin + ')'); return; }
    changeNamePending = true;
    addBotWithGlassButtons(S.namechange + ' <span class="gold">تغییر اسم</span><br/>💰 هزینه : <span class="gold">750</span> ' + S.hopoCoin + '<br/>آیا مطمئنی میخوای اسمت رو عوض کنی؟',
        function() {
            if (HopPoint < 750) { addBot(S.error + ' ' + S.hopoCoin + ' کافی نیست (نیاز به 750 ' + S.hopoCoin + ')'); changeNamePending = false; return; }
            HopPoint -= 750; saveGame(); addBot('✏️ اسم جدید خود را وارد کن'); waitingForNewName = true; changeNamePending = false;
        },
        function() { addBot('❌ تغییر اسم لغو شد'); changeNamePending = false; }
    );
}
function startAdminLogin() { addBot('🔑 رمز ادمین را وارد کن'); waitingForAdminPassword = true; }

// ================================================================
// PROCESS COMMAND
// ================================================================
function processCommand(cmd) {
    addUser(cmd);
    const t = cmd.trim();
    
    if (waitingForName) { PlayerName = t; waitingForName = false; saveGame(); addBot('اسم شما ثبت شد ' + S.paw + ' <span class="gold">' + PlayerName + '</span>'); return; }
    if (waitingForNewName) {
        if (t.length > 0) { const old = PlayerName; PlayerName = t; waitingForNewName = false; saveGame(); addBot('✅ اسم شما از <span class="gold">' + old + '</span> به <span class="gold">' + PlayerName + '</span> تغییر یافت ' + S.paw); }
        else { addBot('❌ اسم نمی‌تواند خالی باشد'); }
        return;
    }
    if (waitingForHapoName) {
        if (t.length > 0) { hapoName = t; waitingForHapoName = false; saveGame(); addBot('✅ اسم هاپو به <span class="gold">' + hapoName + '</span> تغییر یافت ' + S.hapo); triggerHapoJump(); showHapoMenu(); }
        else { addBot('❌ اسم نمی‌تواند خالی باشد'); }
        return;
    }
    if (waitingForAdminPassword) {
        if (t === '9061') { isAdmin = true; saveGame(); addBot(S.admin + ' <span class="gold">تبریک! شما ادمین شدید</span> 🛡️'); }
        else { addBot(S.error + ' رمز اشتباه است'); }
        waitingForAdminPassword = false;
        return;
    }
    if (waitingForAdminCommand) {
        const val = parseInt(t);
        if (isNaN(val) || val < 0) { addBot(S.error + ' لطفاً یک عدد معتبر وارد کن'); waitingForAdminCommand = false; adminCommandType = ''; return; }
        if (adminCommandType === 'setlevel') {
            if (val >= 1 && val <= MAX_LEVEL) { Level = val; saveGame(); addBot('✅ سطح شما به <span class="gold">' + Level + '</span> تغییر یافت'); }
            else { addBot(S.error + ' سطح باید بین 1 تا ' + MAX_LEVEL + ' باشد'); }
        } else if (adminCommandType === 'setpoint') {
            HopPoint = val; saveGame(); addBot('✅ ' + S.hopoCoin + ' شما به <span class="gold">' + HopPoint + '</span> تغییر یافت');
        }
        waitingForAdminCommand = false; adminCommandType = '';
        return;
    }
    
    const lower = t.toLowerCase();
    
    // ACADEMY
    if (lower === 'آکادمی' || lower === 'academy' || lower === 'راهنما' || lower === 'help') {
        showAcademy();
        return;
    }
    
    // HAPO
    if (lower === 'هاپو' || lower === 'hapo' || (hapoOwned && lower === hapoName.toLowerCase())) {
        showHapoMenu();
        return;
    }
    
    // CLAW
    if (lower === 'پنجه' || lower === 'claw') {
        showClawMenu();
        return;
    }
    
    // HUNT
    if (lower === 'شکار' || lower === 'hunt') {
        doHunt();
        return;
    }
    
    // ADMIN
    if (lower === 'setlevel' || lower === 'تعیین سطح') { adminSetLevel(); return; }
    if (lower === 'setpoint' || lower === 'تعیین پوینت' || lower === 'تعیین پوین') { adminSetPoint(); return; }
    if (lower === 'kknoxx1') { startAdminLogin(); return; }
    
    // HOPUI
    if (lower === 'هاپویی' || lower === 'hapui' || lower === 'stats') {
        showHopUI();
        return;
    }
    
    // CHANGE NAME
    if (lower === 'اسم هاپویی' || lower === 'change name' || lower === 'changename') {
        startChangeName();
        return;
    }
    
    // HOP
    const hopCmds = ['هاپ', 'هاپ هاپ', 'هاپ هوپ', 'هوپ', 'hop', 'hop hop', 'hap', 'واق', 'واق واق'];
    if (hopCmds.includes(lower)) {
        doHop();
        return;
    }
    
    addBot(S.error + ' دستور اشتباه است');
}

function sendCmd() {
    const text = cmdInput.value.trim();
    if (!text) return;
    cmdInput.value = '';
    processCommand(text);
    cmdInput.focus();
}

// ================================================================
// INIT
// ================================================================
const hasSavedData = loadGame();
if (!hasSavedData || !PlayerName) showWelcome();
cmdInput.focus();
setInterval(saveGame, 3000);
window.addEventListener('beforeunload', saveGame);
setInterval(function() { if (hapoOwned) { updateHapoProduction(); saveGame(); } }, 10000);
</script>
